name: Build Custom Firmware

on:
  push:
    branches:
      - master
    paths:
      - "configs/*.config"
      - ".github/workflows/build-custom-firmware.yml"
  pull_request:
    branches:
      - master
    paths:
      - "configs/*.config"
      - ".github/workflows/build-custom-firmware.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-matrix:
    name: Detect Changed Configurations
    runs-on: ubuntu-22.04
    outputs:
      matrix-configs: ${{ steps.set-matrix.outputs.configs }}
      has-configs: ${{ steps.set-matrix.outputs.has_configs }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Matrix List
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CONFIGS_JSON=$(find configs -maxdepth 1 -name "*.config" -printf "%f\n" | sed 's/\.config$//' | sort | jq -R -s -c 'split("\n")[:-1]')
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "${BASE_REF}" --depth=1
            CHANGED=$(git diff --name-only "origin/${BASE_REF}...${GITHUB_SHA}" -- "configs/*.config" || true)
            CONFIGS_JSON=$(printf "%s\n" "${CHANGED}" | sed '/^$/d' | xargs -r -n1 basename | sed 's/\.config$//' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              CHANGED=$(find configs -maxdepth 1 -name "*.config" -printf "configs/%f\n" | sort)
            else
              CHANGED=$(git diff --name-only "${BEFORE_SHA}...${GITHUB_SHA}" -- "configs/*.config" || true)
            fi
            CONFIGS_JSON=$(printf "%s\n" "${CHANGED}" | sed '/^$/d' | xargs -r -n1 basename | sed 's/\.config$//' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          fi

          if [ "${CONFIGS_JSON}" = "[]" ]; then
            echo "No changed configs detected."
            echo "configs=[]" >> "$GITHUB_OUTPUT"
            echo "has_configs=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed configs: ${CONFIGS_JSON}"
            echo "configs=${CONFIGS_JSON}" >> "$GITHUB_OUTPUT"
            echo "has_configs=true" >> "$GITHUB_OUTPUT"
          fi

  build-firmware:
    name: Build (${{ matrix.config }})
    needs: setup-matrix
    if: needs.setup-matrix.outputs.has-configs == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup-matrix.outputs.matrix-configs) }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget jq

      - name: Cache downloads (dl)
        uses: actions/cache@v4
        with:
          path: dl
          key: dl-${{ matrix.config }}-${{ hashFiles('include/target.mk', 'package/libs/toolchain/Makefile') }}
          restore-keys: |
            dl-${{ matrix.config }}-
            dl-

      - name: Update and Install Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Device Configuration
        run: |
          cp "configs/${{ matrix.config }}.config" .config
          make defconfig

      - name: Download Package Sources
        run: |
          make download

      - name: Build Firmware
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.config }}
          path: bin/targets/
